# Link your remote project: supabase link --project-ref YOUR_PROJECT_REF
# Project ref is stored in supabase/.temp/ after linking (not in this file).

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
enable_anonymous_sign_ins = true

[functions.chat]
verify_jwt = true

[functions.auth]
verify_jwt = false
